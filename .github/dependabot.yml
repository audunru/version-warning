version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      all-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      all-dependencies:
        patterns:
          - "*"
